[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "22.12.0"

[dev]
command = "npm run dev"
port = 8888
targetPort = 5173
framework = "vite"

[context.production.environment]
SITE_URL = "https://ghataksportsacademy.com"

[context.deploy-preview.environment]
SITE_URL = "${DEPLOY_PRIME_URL}"

[template.environment]
LOVABLE_DEV_SERVER = "true"

[[redirects]]
from = "/event"
to = "/events"
status = 301

[[redirects]]
from = "/event/"
to = "/events"
status = 301

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Strict-Transport-Security = "max-age=31536000; includeSubDomains"
X-Robots-Tag = "all"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms https://c.clarity.ms https://scripts.clarity.ms 'unsafe-inline'; script-src-elem 'self' https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms https://c.clarity.ms https://scripts.clarity.ms 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://jddeuhrocglnisujixdt.supabase.co https://*.supabase.co wss://*.supabase.co https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://formsubmit.co https://www.clarity.ms https://c.clarity.ms; form-action 'self' https://formsubmit.co; frame-src https://www.googletagmanager.com https://www.google.com https://tagassistant.google.com https://*.google.com;"

[[headers]]
for = "/assets/hero/intro.mp4"

[headers.values]
X-Robots-Tag = "noindex"
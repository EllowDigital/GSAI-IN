[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20.17.0"

[dev]
command = "npm run dev"
port = 8888
targetPort = 5173
framework = "vite"

[context.production.environment]
SITE_URL = "https://ghataksportsacademy.com"

[context.deploy-preview.environment]
SITE_URL = "${DEPLOY_PRIME_URL}"

[template.environment]
LOVABLE_DEV_SERVER = "true"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
X-Robots-Tag = "all"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://jddeuhrocglnisujixdt.supabase.co https://*.supabase.co wss://*.supabase.co https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net; frame-src https://www.googletagmanager.com;"